<div class="login-div">
    <div class="login-info">
        <img src="assets/logo.svg" alt="Logo" class="logo">
        <h1 class="login-title">Welcome to Note</h1>
        <p class="login-paragraph">Please log in to continue</p>
    </div>
    <form action="">
        <div class="login-input-div">
            <label for="" class="login-input-lable">Email Address</label>
            <input type="text" class="login-input" placeholder="email@example.com">
        </div>
        <div class="login-input-div">
            <label for="" class="login-input-lable">Password</label>
            <input type="text" class="login-input">
        </div>
    </form>
    <p class="login-paragraph-anchor">No account yet?<span class="login-anchor">Sign Up</span></p>
</div>
